<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">Category Thumbnail</title>
  <desc id="desc">Static thumbnail for category cards</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f1d1d" />
      <stop offset="50%" stop-color="#9d174d" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
  </defs>
  <rect width="320" height="320" rx="28" fill="url(#bg)" />
  <circle cx="88" cy="86" r="44" fill="#fda4af" opacity="0.3" />
  <circle cx="246" cy="246" r="58" fill="#f472b6" opacity="0.25" />
  <rect x="52" y="124" width="216" height="130" rx="18" fill="#111827" opacity="0.75" />
  <text x="160" y="182" text-anchor="middle" fill="#ffffff" font-size="28" font-family="Arial, sans-serif" font-weight="700">CATEGORY</text>
  <text x="160" y="214" text-anchor="middle" fill="#f9a8d4" font-size="14" font-family="Arial, sans-serif">STATIC IMAGE</text>
</svg>
